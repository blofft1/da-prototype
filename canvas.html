<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document Authoring — Experience Workspace (Prototype)</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="canvas-body">

  <div class="cv-topbar">
    <div class="logomark">A</div>
    <div class="cv-crumb" id="cvCrumb"><a href="index.html">blofft1</a> › <a href="index.html">wknd-advanced</a> › <b id="crumbPage">index</b></div>
    <div class="appbar-spacer"></div>
    <div class="cv-top-action" id="feedbackBtn">💬 Feedback</div>
    <div class="cv-top-icon" title="Page source">📄</div>
    <button class="cv-send" id="publishBtn" title="Publish">➤</button>
    <div class="avatar">B</div>
  </div>

  <div class="cv-shell">
    <div class="rail">
      <div class="rail-item">⌂</div>
      <div class="rail-item">◱</div>
      <div class="rail-item">💡</div>
    </div>

    <!-- Left: AI assistant panel -->
    <div class="cv-ai">
      <div class="cv-ai-center">
        <h2>Welcome, Bill</h2>
        <p>What are we working on today?</p>
      </div>
      <div class="cv-ai-foot">
        <div class="cv-ai-box">
          <input placeholder="Ask anything, or type / for skills…">
          <button class="cv-ai-plus">+</button>
        </div>
        <p class="cv-ai-note">Responses are generated using AI, and may be inaccurate. Check before using. <a href="#">AI User Guidelines</a></p>
      </div>
    </div>

    <!-- Center: editing canvas -->
    <div class="cv-canvas-col">
      <div class="cv-canvas-toolbar">
        <div class="cv-tb-left">
          <button title="Undo">↶</button>
          <button title="Redo">↷</button>
        </div>
        <div class="cv-tb-center">
          <div class="cv-seg" id="viewSeg">
            <button class="active" data-view="layout">Layout</button>
            <button data-view="content">Content</button>
          </div>
          <button class="cv-split" title="Split view">▤</button>
        </div>
        <div class="cv-tb-right"></div>
      </div>

      <div class="cv-canvas-scroll">
        <div class="cv-doc">
          <div class="cv-block">
            <div class="cv-block-head">hero</div>
            <div class="cv-hero-img" style="background-image:url('https://images.unsplash.com/photo-1551632811-561732d1e306?auto=format&fit=crop&w=1200&q=60')"></div>
          </div>
          <div class="cv-img" style="background-image:url('https://images.unsplash.com/photo-1454496522488-7a8e488e8606?auto=format&fit=crop&w=1200&q=60')"></div>
          <div class="cv-text" contenteditable="true">Explore · Wander · Belong</div>
        </div>
      </div>
    </div>

    <!-- Right: Files tree -->
    <div class="cv-files">
      <div class="cv-files-head">▭ Files ⌄</div>
      <div class="cv-tree">
        <div class="cv-tree-root">⌄ wknd-advanced</div>
        <div id="treeItems"></div>
      </div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const page = params.get('page') || 'index';
  const title = params.get('title') || page;

  document.getElementById('crumbPage').textContent = page;
  document.title = 'Editing ' + page + ' — Experience Workspace';

  // ----- File tree (mirrors the real DA Files panel) -----
  const tree = [
    {name:'about-us'}, {name:'already-investing'}, {name:'articles', folder:true}, {name:'articles'},
    {name:'de', folder:true}, {name:'demo-docs', folder:true}, {name:'demo-slides', folder:true},
    {name:'en', folder:true}, {name:'es', folder:true}, {name:'events', folder:true}, {name:'events'},
    {name:'experimentation', folder:true}, {name:'extras'}, {name:'faqs', folder:true}, {name:'footer'},
    {name:'forms', folder:true}, {name:'fr', folder:true}, {name:'fragments', folder:true},
    {name:'guided-journey'}, {name:'hi', folder:true}, {name:'icons', folder:true}, {name:'index'},
    {name:'learn', folder:true}, {name:'learn'}, {name:'media', folder:true}, {name:'nav'},
    {name:'new-to-investing'}, {name:'products', folder:true}, {name:'products'}, {name:'search'},
    {name:'start-here', folder:true}, {name:'start-here'}, {name:'test', folder:true},
  ];
  const treeEl = document.getElementById('treeItems');
  let highlighted = false;
  tree.forEach(t => {
    const el = document.createElement('div');
    const isActive = !highlighted && !t.folder && t.name === page;
    if(isActive) highlighted = true;
    el.className = 'cv-tree-item' + (isActive ? ' active' : '');
    el.innerHTML = `<span class="tw">${t.folder ? '›' : ''}</span>${t.name}`;
    if(!t.folder){
      el.addEventListener('click', () => { location.href = 'canvas.html?page=' + encodeURIComponent(t.name) + '&title=' + encodeURIComponent(t.name); });
    }
    treeEl.appendChild(el);
  });

  // ----- Layout / Content toggle (cosmetic) -----
  document.querySelectorAll('#viewSeg button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#viewSeg button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  document.getElementById('publishBtn').addEventListener('click', () => alert('Mockup: this would publish "' + title + '" to the live site.'));
  document.getElementById('feedbackBtn').addEventListener('click', () => alert('Mockup: this would open the feedback panel.'));
</script>
</body>
</html>
